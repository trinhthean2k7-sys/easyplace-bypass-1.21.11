plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
}

version = '1.0.0'
group = 'net.example.mod'

repositories {
    maven { url = "https://maven.shedaniel.me/" }
    maven { url = "https://cursemaven.com" }
    maven { url = "https://maven.fabricmc.net/" }
}

dependencies {
    // Thư viện cốt lõi cho bản 1.21.11 (Sử dụng phiên bản tương thích rộng)
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.11"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.8+1.21.11"

    // Thư viện Litematica chạy nền
    modImplementation "curse.maven:litematica-308892:5631405"
    modImplementation "curse.maven:malilib-243142:5631400"
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}
